<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Import Emails - Tabitha's Misery</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: { extend: { colors: {
      "background": "#0d0d0f",
      "on-surface": "#f0f0f2",
      "on-surface-variant": "#8a8a8e",
      "primary": "#32d74b",
    }, fontFamily: { body: ["Inter"] } } }
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; }

  /* !important defeats the @tailwindcss/forms plugin, which forces a white
     input background (white-on-white text otherwise). */
  .field {
    width: 100%;
    background: #1b1b1e !important;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 11px 12px;
    font-size: 13px;
    color: #f0f0f2 !important;
    -webkit-text-fill-color: #f0f0f2 !important;
    font-family: Inter, sans-serif;
    outline: none;
    box-sizing: border-box;
  }
  .field::placeholder { -webkit-text-fill-color: rgba(138,138,142,0.5); color: rgba(138,138,142,0.5); }
  .field:focus { border-color: rgba(50,215,75,0.4); background: #20241f !important; }
  input[type="date"].field, input[type="month"].field, select.field { color-scheme: dark; }
  select.field option { background:#1e1e21; color:#f0f0f2; }
  /* Defeat the white-on-white autofill paint in Android WebView */
  .field:-webkit-autofill,
  .field:-webkit-autofill:hover,
  .field:-webkit-autofill:focus {
    -webkit-text-fill-color: #f0f0f2 !important;
    -webkit-box-shadow: 0 0 0 1000px #1b1b1e inset !important;
    caret-color: #f0f0f2;
  }

  .txn-card { background:#161618; border:1px solid rgba(255,255,255,0.06); border-radius:14px; padding:12px; margin-bottom:10px; transition:opacity .15s, border-color .15s; }
  .txn-card.excluded { opacity:0.4; }
  .txn-card.already { opacity:0.55; border-style:dashed; }

  /* iOS-style checkbox */
  .chk { width:22px; height:22px; flex-shrink:0; border-radius:7px; border:2px solid #3a3a3e; background:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .chk.on { background:#32d74b; border-color:#32d74b; }
  .chk .material-symbols-outlined { font-size:16px; color:#00390a; display:none; }
  .chk.on .material-symbols-outlined { display:block; }

  @media (min-width: 768px) {
    body.has-desktop-sidebar { overflow-x: hidden; }
    body.has-desktop-sidebar [data-main-with-sidebar] { margin-left: var(--sidebar-width, 16rem); width: calc(100vw - var(--sidebar-width, 16rem)); max-width: calc(100vw - var(--sidebar-width, 16rem)); }
    body.sidebar-collapsed [data-main-with-sidebar] { margin-left: 0; width: 100vw; max-width: 100vw; }
    [data-desktop-sidebar] { transition: transform 0.25s ease; }
    body.sidebar-collapsed [data-desktop-sidebar] { transform: translateX(-100%); }
  }
</style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen pb-28">

<div id="sidebar-container"></div>

<header class="fixed top-0 left-0 right-0 z-50 md:hidden" style="padding-top:env(safe-area-inset-top);background:rgba(13,13,15,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);">
    <div class="flex items-center gap-3 px-4 py-3">
        <a href="account.html" class="flex items-center justify-center active:scale-90 transition-transform" style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.05);color:#8a8a8e;">
            <span class="material-symbols-outlined" style="font-size:19px;">arrow_back</span>
        </a>
        <span style="color:#f0f0f2;font-weight:700;font-size:17px;font-family:Inter,sans-serif;">Import Emails</span>
    </div>
</header>

<main data-main-with-sidebar class="flex-grow pt-16 pb-28 max-w-2xl w-full mx-auto px-4">

    <!-- Gmail credentials -->
    <p style="font-size:11px;font-weight:600;color:#8a8a8e;text-transform:uppercase;letter-spacing:0.08em;margin:18px 0 10px;">Gmail Account</p>
    <div style="background:#161618;border-radius:16px;border:1px solid rgba(255,255,255,0.05);padding:14px;margin-bottom:18px;">
        <input id="gmail-user-input" type="email" autocomplete="off" placeholder="you@gmail.com" class="field" style="margin-bottom:10px;"/>
        <input id="gmail-pass-input" type="password" autocomplete="off" placeholder="16-character app password" class="field" style="letter-spacing:0.08em;"/>
        <p style="font-size:10px;color:rgba(138,138,142,0.7);margin-top:8px;line-height:1.4;">Needs 2-Step Verification, then an App Password from myaccount.google.com → Security → App passwords. Stored securely on this device.</p>
    </div>

    <!-- Range + scan -->
    <p style="font-size:11px;font-weight:600;color:#8a8a8e;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Date Range</p>
    <div style="display:flex;gap:10px;margin-bottom:12px;">
        <div style="flex:1;">
            <p style="font-size:10px;color:#8a8a8e;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em;">From</p>
            <input id="import-from" type="month" class="field"/>
        </div>
        <div style="flex:1;">
            <p style="font-size:10px;color:#8a8a8e;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em;">To</p>
            <input id="import-to" type="month" class="field"/>
        </div>
    </div>
    <button id="scan-emails-btn" class="active:scale-95 transition-transform" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;background:rgba(50,215,75,0.1);border-radius:12px;border:1px solid rgba(50,215,75,0.2);color:#32d74b;cursor:pointer;font-family:Inter,sans-serif;margin-bottom:8px;">
        <span class="material-symbols-outlined" style="font-size:18px;">search</span>
        <span style="font-size:13px;font-weight:700;letter-spacing:0.03em;">Scan Emails</span>
    </button>

    <!-- Status line -->
    <div id="import-status" style="display:none;font-size:12px;margin:10px 2px;font-family:Inter,sans-serif;"></div>

    <!-- Select-all toolbar (hidden until results) -->
    <div id="import-toolbar" style="display:none;align-items:center;justify-content:space-between;margin:18px 2px 10px;">
        <p style="font-size:11px;font-weight:600;color:#8a8a8e;text-transform:uppercase;letter-spacing:0.08em;">Review</p>
        <button id="toggle-all-btn" style="font-size:12px;font-weight:600;color:#32d74b;background:none;border:none;cursor:pointer;font-family:Inter,sans-serif;">Deselect all</button>
    </div>

    <!-- Results list (populated by app.js) -->
    <div id="import-results"></div>

    <!-- Import action: kept in normal page flow so the bottom nav never covers it -->
    <div id="import-action-bar" style="display:none;margin-top:18px;">
        <button id="import-confirm-btn" class="active:scale-95 transition-transform" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:#32d74b;border-radius:14px;border:none;color:#00390a;cursor:pointer;font-family:Inter,sans-serif;">
            <span class="material-symbols-outlined" style="font-size:19px;">download</span>
            <span id="import-confirm-label" style="font-size:14px;font-weight:800;letter-spacing:0.03em;">Import</span>
        </button>
    </div>

</main>

<div id="bottombar-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body></html>
